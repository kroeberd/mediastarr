# Beispiel: Mehrere Instanzen mit eigenem Docker-Netzwerk
services:
  mediastarr:
    image: kroeberd/mediastarr:latest
    container_name: mediastarr
    restart: unless-stopped
    ports:
      - "7979:7979"
    volumes:
      - /mnt/user/appdata/mediastarr:/data
    # environment:
    #   - MEDIASTARR_PASSWORD=change-me
    networks:
      - arr

networks:
  arr:
    external: true   # Name des bestehenden Netzwerks deines Arr-Stacks
